schema_version: 1

context:
  name: aenum
  version: 3.1.17

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/aenum/aenum-${{ version }}.tar.gz
  sha256: a969a4516b194895de72c875ece355f17c0d272146f7fda346ef74f93cf4d5ba

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - aenum
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  license: BSD-3-Clause
  license_file: aenum/LICENSE
  summary: Advanced Enumerations (compatible with Python's stdlib Enum), NamedTuples,
  homepage: https://github.com/ethanfurman/aenum

extra:
  recipe-maintainers:
    - sodre
    - jan-janssen
    - thewchan
